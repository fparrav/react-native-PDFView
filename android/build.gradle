def safeExtGet(prop, fallback = null) {
    if (rootProject.ext.has(prop)) {
        return rootProject.ext[prop]
    }
    if (project.properties[prop]) {
        return project.properties[prop]
    }
    return fallback
}

apply plugin: 'com.android.library'


android {
    compileSdkVersion safeExtGet('compileSdkVersion')
    buildToolsVersion safeExtGet('buildToolsVersion')

    defaultConfig {
        minSdkVersion safeExtGet('minSdkVersion')
        targetSdkVersion safeExtGet('targetSdkVersion')
    }
    lintOptions {
        abortOnError false
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    //noinspection GradleDynamicVersion
    implementation "com.facebook.react:react-native:+"

    implementation("com.github.DImuthuUpe:AndroidPdfViewer:3.1.0-beta.1") {
        exclude group: 'com.github.barteksc', module: 'pdfium-android'
    }

    // pdfium-android parcheado para 16KB page size (arm64-v8a, x86_64)
    implementation 'com.github.fparrav:PdfiumAndroid:1.9.0-16kb'
}
